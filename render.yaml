# Render Blueprint — muscle-tracker API
# ドキュメント: https://render.com/docs/blueprint-spec
#
# DB は Neon (serverless PostgreSQL) を使用します。
# https://neon.tech でプロジェクト作成後、接続 URL を DATABASE_URL に設定してください。
# 形式: postgresql://user:password@ep-xxx.region.aws.neon.tech/dbname?sslmode=require

services:
  - type: web
    name: muscle-tracker-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /up
    autoDeploy: true

    # デプロイ前にマイグレーションを実行（ゼロダウンタイムデプロイ）
    preDeployCommand: bundle exec rails db:migrate

    envVars:
      - key: RAILS_ENV
        value: production

      - key: RAILS_LOG_TO_STDOUT
        value: "true"

      # config/master.key の内容を Render ダッシュボードで設定
      - key: RAILS_MASTER_KEY
        sync: false

      # Neon の接続 URL: postgresql://user:pass@ep-xxx.region.aws.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false

      # Vercel の URL を設定: https://your-app.vercel.app
      # 複数ある場合はカンマ区切り: https://a.vercel.app,https://custom.domain
      - key: CORS_ORIGINS
        sync: false
